<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Portfolio | Naufal</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-success: #22c55e;
            --accent-danger: #ef4444;
            --accent-warning: #eab308;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .dashboard-card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            border: 1px solid #334155;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .status-badge {
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .metric-box {
            background-color: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }

        .architecture-visual {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #334155;
        }

        .pod-container {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }

        .pod {
            width: 30%;
            height: 8px;
            background-color: #334155;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .pod-active::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--accent-success);
            opacity: 0.8;
            animation: load 3s infinite ease-in-out;
        }

        .pod-failed::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--accent-danger);
            opacity: 0.8;
        }

        .pod:nth-child(2)::after { animation-delay: 0.5s; }
        .pod:nth-child(3)::after { animation-delay: 1s; }

        @keyframes load {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <div class="header">
            <div>
                <h2 style="margin: 0;">Kubernetes Cluster</h2>
                <span style="font-size: 0.875rem; color: var(--text-secondary);">Managed by Naufal</span>
            </div>
            <div class="status-badge" id="status-badge">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">CONNECTING...</span>
            </div>
        </div>

        <div class="metric-grid">
            <div class="metric-box">
                <div class="metric-label">Uptime</div>
                <div class="metric-value">99.99%</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">Replica Count</div>
                <div class="metric-value">3</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">Pipeline</div>
                <div class="metric-value" style="color: var(--accent-success);">GitHub Actions</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">Infrastructure</div>
                <div class="metric-value">Docker/K8s</div>
            </div>
        </div>

        <div class="architecture-visual">
            <div style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                Live Pod Visualization
            </div>
            <div class="pod-container">
                <div class="pod" id="pod-1"></div>
                <div class="pod" id="pod-2"></div>
                <div class="pod" id="pod-3"></div>
            </div>
        </div>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: #64748b;">
            Served via Nginx Container | Build ID: <span id="build-id">Fetching...</span>
        </p>
    </div>

    <script>
        const owner = 'nuafal';
        const repo = 'my-devops-demo';
        const githubApiUrl = `https://api.github.com/repos/${owner}/${repo}/actions/runs`;

        async function fetchLivePipelineStatus() {
            try {
                const response = await fetch(githubApiUrl);
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.workflow_runs && data.workflow_runs.length > 0) {
                    const latestRun = data.workflow_runs[0];
                    updateDashboard(latestRun.status, latestRun.conclusion, latestRun.run_number);
                }
            } catch (error) {
                console.error("Sensor wire failed:", error);
                document.getElementById('status-text').textContent = 'API BLOCKED';
                document.getElementById('status-badge').style.color = '#eab308';
            }
        }

        function updateDashboard(status, conclusion, buildId) {
            const badge = document.getElementById('status-badge');
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const pods = document.querySelectorAll('.pod');
            
            // Update the Build ID at the bottom
            document.getElementById('build-id').textContent = `v2.0.${buildId}`;

            // Check if it Failed
            if (status === 'completed' && conclusion === 'failure') {
                text.textContent = 'PIPELINE FAILED';
                badge.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                badge.style.color = '#ef4444';
                badge.style.borderColor = 'rgba(239, 68, 68, 0.2)';
                dot.style.backgroundColor = '#ef4444';
                dot.style.boxShadow = '0 0 10px rgba(239, 68, 68, 0.5)';
                pods.forEach(p => { p.classList.add('pod-failed'); p.classList.remove('pod-active'); });
            } 
            // Check if it Passed
            else if (status === 'completed' && conclusion === 'success') {
                text.textContent = 'OPERATIONAL';
                badge.style.backgroundColor = 'rgba(34, 197, 94, 0.1)';
                badge.style.color = '#22c55e';
                badge.style.borderColor = 'rgba(34, 197, 94, 0.2)';
                dot.style.backgroundColor = '#22c55e';
                dot.style.boxShadow = '0 0 10px rgba(34, 197, 94, 0.5)';
                pods.forEach(p => { p.classList.add('pod-active'); p.classList.remove('pod-failed'); });
            } 
            // Check if it is currently running
            else {
                text.textContent = 'BUILDING...';
                badge.style.backgroundColor = 'rgba(234, 179, 8, 0.1)';
                badge.style.color = '#eab308';
                badge.style.borderColor = 'rgba(234, 179, 8, 0.2)';
                dot.style.backgroundColor = '#eab308';
                dot.style.boxShadow = '0 0 10px rgba(234, 179, 8, 0.5)';
            }
        }

        // Fire the sensor immediately
        fetchLivePipelineStatus();
        
        // Keep checking every 15 seconds
        setInterval(fetchLivePipelineStatus, 15000); 
    </script>
</body>
</html>
